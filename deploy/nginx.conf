resolver 127.0.0.11 valid=10s ipv6=off;

map $http_x_forwarded_proto $fiber_offers_forwarded_proto {
  default $http_x_forwarded_proto;
  ""      $scheme;
}

map $http_x_forwarded_host $fiber_offers_forwarded_host {
  default $http_x_forwarded_host;
  ""      $http_host;
}

server {
  listen 8080;
  server_name _;

  location / {
    set $resolver_upstream http://fiber-offers:8787;
    proxy_pass $resolver_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-Host $fiber_offers_forwarded_host;
    proxy_set_header X-Forwarded-Proto $fiber_offers_forwarded_proto;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_connect_timeout 5s;
    proxy_read_timeout 65s;
  }
}
